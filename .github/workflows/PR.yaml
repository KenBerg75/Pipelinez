name: PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  TEST_RESULTS_DIR: ${{ github.workspace }}/artifacts/test-results

jobs:
  build-and-test:
    name: Build And Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/Pipelinez.sln

      - name: Build
        run: dotnet build src/Pipelinez.sln --configuration Release --no-restore

      - name: Prepare Test Results Directory
        run: mkdir -p "${TEST_RESULTS_DIR}"

      - name: Test
        id: test
        continue-on-error: true
        run: dotnet test src/Pipelinez.sln --configuration Release --no-build --logger "console;verbosity=minimal" --logger "junit;LogFilePath=${TEST_RESULTS_DIR}/{assembly}.xml;MethodFormat=Class;FailureBodyFormat=Verbose"

      - name: Publish Test Summary
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: "${{ env.TEST_RESULTS_DIR }}/*.xml"
          title: "Pipelinez Test Results"
          summary-report: true
          failed-report: true
          github-report: true
          annotate: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment Test Results On Pull Request
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: "${{ env.TEST_RESULTS_DIR }}/*.xml"
          title: "Pipelinez Test Results"
          pull-request-report: true
          update-comment: true
          comment-tag: pipelinez-test-results
          on-fail-only: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Test Result Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-test-results
          path: ${{ env.TEST_RESULTS_DIR }}/*.xml
          if-no-files-found: warn

      - name: Fail Workflow If Tests Failed
        if: steps.test.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Pack Pipelinez
        run: dotnet pack src/Pipelinez/Pipelinez.csproj --configuration Release --no-build -o artifacts/packages -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Pack Pipelinez.Kafka
        run: dotnet pack src/Pipelinez.Kafka/Pipelinez.Kafka.csproj --configuration Release --no-build -o artifacts/packages -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Pack Pipelinez.PostgreSql
        run: dotnet pack src/Pipelinez.PostgreSql/Pipelinez.PostgreSql.csproj --configuration Release --no-build -o artifacts/packages -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Validate Packages
        shell: pwsh
        run: ./scripts/Validate-Packages.ps1 -PackageDirectory artifacts/packages
