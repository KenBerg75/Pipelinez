name: PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  TEST_RESULTS_DIR: ${{ github.workspace }}/artifacts/test-results

jobs:
  build-and-test:
    name: Build And Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/Pipelinez.sln

      - name: Build
        run: dotnet build src/Pipelinez.sln --configuration Release --no-restore

      - name: Prepare Test Results Directory
        run: mkdir -p "${TEST_RESULTS_DIR}"

      - name: Test
        id: test
        continue-on-error: true
        run: dotnet test src/Pipelinez.sln --configuration Release --no-build --results-directory "${TEST_RESULTS_DIR}" --logger "console;verbosity=minimal" --logger "trx;LogFilePrefix=pipelinez-tests"

      - name: Publish Test Results
        if: always()
        uses: turing85/publish-report@v2
        with:
          github-token: ${{ github.token }}
          cancel-workflow-on-error: 'false'
          comment-enabled: ${{ github.event.pull_request.head.repo.full_name == github.repository && 'true' || 'false' }}
          comment-header: pipelinez-test-results
          comment-message-success: |
            ## Pipelinez Test Results

            `{0}` passed.

            | Passed | Failed | Skipped |
            |--------|--------|---------|
            | ✅ {1} | ❌ {2} | ⚠️ {3} |

            Full check details are available [here]({4}).
          comment-message-failure: |
            ## Pipelinez Test Results

            `{0}` failed.

            | Passed | Failed | Skipped |
            |--------|--------|---------|
            | ✅ {1} | ❌ {2} | ⚠️ {3} |

            Full check details are available [here]({4}).
          report-fail-on-error: 'false'
          report-list-suites: failed
          report-list-tests: failed
          report-name: Pipelinez Tests
          report-path: "${{ env.TEST_RESULTS_DIR }}/*.trx"
          report-reporter: dotnet-trx

      - name: Upload Test Result Files
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-test-results
          path: ${{ env.TEST_RESULTS_DIR }}/*.trx
          if-no-files-found: warn

      - name: Fail Workflow If Tests Failed
        if: steps.test.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Pack Pipelinez
        run: dotnet pack src/Pipelinez/Pipelinez.csproj --configuration Release --no-build -o artifacts/packages -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Pack Pipelinez.Kafka
        run: dotnet pack src/Pipelinez.Kafka/Pipelinez.Kafka.csproj --configuration Release --no-build -o artifacts/packages -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Pack Pipelinez.AzureServiceBus
        run: dotnet pack src/Pipelinez.AzureServiceBus/Pipelinez.AzureServiceBus.csproj --configuration Release --no-build -o artifacts/packages -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Pack Pipelinez.RabbitMQ
        run: dotnet pack src/Pipelinez.RabbitMQ/Pipelinez.RabbitMQ.csproj --configuration Release --no-build -o artifacts/packages -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Pack Pipelinez.AmazonS3
        run: dotnet pack src/Pipelinez.AmazonS3/Pipelinez.AmazonS3.csproj --configuration Release --no-build -o artifacts/packages -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Pack Pipelinez.PostgreSql
        run: dotnet pack src/Pipelinez.PostgreSql/Pipelinez.PostgreSql.csproj --configuration Release --no-build -o artifacts/packages -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Pack Pipelinez.SqlServer
        run: dotnet pack src/Pipelinez.SqlServer/Pipelinez.SqlServer.csproj --configuration Release --no-build -o artifacts/packages -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Validate Packages
        shell: pwsh
        run: ./scripts/Validate-Packages.ps1 -PackageDirectory artifacts/packages
