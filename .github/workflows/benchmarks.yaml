name: Benchmarks

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  BENCHMARK_PROJECT: src/benchmarks/Pipelinez.Benchmarks
  BENCHMARK_ARTIFACT_ROOT: artifacts/benchmarks

jobs:
  in-memory:
    name: In-Memory Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore Benchmark Project
        run: dotnet restore $BENCHMARK_PROJECT/Pipelinez.Benchmarks.csproj

      - name: Build Benchmark Project
        run: dotnet build $BENCHMARK_PROJECT/Pipelinez.Benchmarks.csproj --configuration Release --no-restore

      - name: Run In-Memory Benchmarks
        shell: bash
        run: |
          set -euo pipefail
          suite="in-memory"
          output_dir="${BENCHMARK_ARTIFACT_ROOT}/${suite}"
          rm -rf "${BENCHMARK_PROJECT}/BenchmarkDotNet.Artifacts" "${output_dir}"
          mkdir -p "${output_dir}"

          dotnet run -c Release --project "${BENCHMARK_PROJECT}" -- --filter "*InMemory*" | tee "${output_dir}/run.log"

          if [ -d "${BENCHMARK_PROJECT}/BenchmarkDotNet.Artifacts" ]; then
            mkdir -p "${output_dir}/BenchmarkDotNet.Artifacts"
            cp -R "${BENCHMARK_PROJECT}/BenchmarkDotNet.Artifacts/." "${output_dir}/BenchmarkDotNet.Artifacts/"
          fi

          cat > "${output_dir}/metadata.json" <<EOF
          {
            "suite": "${suite}",
            "workflow": "${GITHUB_WORKFLOW}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "event": "${GITHUB_EVENT_NAME}",
            "commit": "${GITHUB_SHA}",
            "ref": "${GITHUB_REF}",
            "runner_os": "${RUNNER_OS}",
            "executed_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

      - name: Upload In-Memory Benchmark Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-in-memory
          path: ${{ env.BENCHMARK_ARTIFACT_ROOT }}/in-memory
          if-no-files-found: error

  docker-backed:
    name: Docker Benchmarks (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: kafka
            filter: "*Kafka*"
          - suite: rabbitmq
            filter: "*RabbitMq*"
          - suite: amazon-s3
            filter: "*AmazonS3*"
          - suite: postgresql
            filter: "*PostgreSql*"
          - suite: sqlserver
            filter: "*SqlServer*"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore Benchmark Project
        run: dotnet restore $BENCHMARK_PROJECT/Pipelinez.Benchmarks.csproj

      - name: Build Benchmark Project
        run: dotnet build $BENCHMARK_PROJECT/Pipelinez.Benchmarks.csproj --configuration Release --no-restore

      - name: Run Docker-Backed Benchmarks
        shell: bash
        env:
          PIPELINEZ_BENCH_ENABLE_DOCKER: true
        run: |
          set -euo pipefail
          suite="${{ matrix.suite }}"
          filter="${{ matrix.filter }}"
          output_dir="${BENCHMARK_ARTIFACT_ROOT}/${suite}"
          rm -rf "${BENCHMARK_PROJECT}/BenchmarkDotNet.Artifacts" "${output_dir}"
          mkdir -p "${output_dir}"

          dotnet run -c Release --project "${BENCHMARK_PROJECT}" -- --filter "${filter}" | tee "${output_dir}/run.log"

          if [ -d "${BENCHMARK_PROJECT}/BenchmarkDotNet.Artifacts" ]; then
            mkdir -p "${output_dir}/BenchmarkDotNet.Artifacts"
            cp -R "${BENCHMARK_PROJECT}/BenchmarkDotNet.Artifacts/." "${output_dir}/BenchmarkDotNet.Artifacts/"
          fi

          cat > "${output_dir}/metadata.json" <<EOF
          {
            "suite": "${suite}",
            "filter": "${filter}",
            "workflow": "${GITHUB_WORKFLOW}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "event": "${GITHUB_EVENT_NAME}",
            "commit": "${GITHUB_SHA}",
            "ref": "${GITHUB_REF}",
            "runner_os": "${RUNNER_OS}",
            "executed_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

      - name: Upload Docker Benchmark Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-${{ matrix.suite }}
          path: ${{ env.BENCHMARK_ARTIFACT_ROOT }}/${{ matrix.suite }}
          if-no-files-found: error

  azure-service-bus:
    name: Azure Service Bus Benchmarks
    runs-on: ubuntu-latest
    env:
      PIPELINEZ_ASB_CONNECTION_STRING: ${{ secrets.PIPELINEZ_ASB_CONNECTION_STRING }}

    steps:
      - name: Check Azure Service Bus Benchmark Configuration
        id: config
        shell: bash
        run: |
          if [ -n "${PIPELINEZ_ASB_CONNECTION_STRING}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Azure Service Bus Benchmarks
        if: ${{ steps.config.outputs.enabled != 'true' }}
        run: echo "Skipping Azure Service Bus benchmarks because PIPELINEZ_ASB_CONNECTION_STRING is not configured."

      - name: Checkout
        if: ${{ steps.config.outputs.enabled == 'true' }}
        uses: actions/checkout@v6

      - name: Setup .NET
        if: ${{ steps.config.outputs.enabled == 'true' }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore Benchmark Project
        if: ${{ steps.config.outputs.enabled == 'true' }}
        run: dotnet restore $BENCHMARK_PROJECT/Pipelinez.Benchmarks.csproj

      - name: Build Benchmark Project
        if: ${{ steps.config.outputs.enabled == 'true' }}
        run: dotnet build $BENCHMARK_PROJECT/Pipelinez.Benchmarks.csproj --configuration Release --no-restore

      - name: Run Azure Service Bus Benchmarks
        if: ${{ steps.config.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          suite="azure-service-bus"
          output_dir="${BENCHMARK_ARTIFACT_ROOT}/${suite}"
          rm -rf "${BENCHMARK_PROJECT}/BenchmarkDotNet.Artifacts" "${output_dir}"
          mkdir -p "${output_dir}"

          dotnet run -c Release --project "${BENCHMARK_PROJECT}" -- --filter "*AzureServiceBus*" | tee "${output_dir}/run.log"

          if [ -d "${BENCHMARK_PROJECT}/BenchmarkDotNet.Artifacts" ]; then
            mkdir -p "${output_dir}/BenchmarkDotNet.Artifacts"
            cp -R "${BENCHMARK_PROJECT}/BenchmarkDotNet.Artifacts/." "${output_dir}/BenchmarkDotNet.Artifacts/"
          fi

          cat > "${output_dir}/metadata.json" <<EOF
          {
            "suite": "${suite}",
            "workflow": "${GITHUB_WORKFLOW}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "event": "${GITHUB_EVENT_NAME}",
            "commit": "${GITHUB_SHA}",
            "ref": "${GITHUB_REF}",
            "runner_os": "${RUNNER_OS}",
            "executed_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

      - name: Upload Azure Service Bus Benchmark Artifacts
        if: ${{ steps.config.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-azure-service-bus
          path: ${{ env.BENCHMARK_ARTIFACT_ROOT }}/azure-service-bus
          if-no-files-found: error

  publish-results-pr:
    name: Publish Benchmark Results PR
    needs:
      - in-memory
      - docker-backed
      - azure-service-bus
    if: >-
      ${{
        needs.in-memory.result == 'success' &&
        needs.docker-backed.result == 'success' &&
        needs.azure-service-bus.result == 'success'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Benchmark Artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: benchmarks-*
          path: artifacts/benchmark-results-input
          merge-multiple: false

      - name: Generate Benchmark Results Page
        shell: pwsh
        run: >
          ./scripts/Update-BenchmarkResultsPage.ps1
          -ArtifactsRoot artifacts/benchmark-results-input
          -OutputPath documentation/guides/benchmark-results.md
          -RepoFullName "${{ github.repository }}"
          -RunId "${{ github.run_id }}"
          -RunAttempt "${{ github.run_attempt }}"

      - name: Create Pull Request With Benchmark Token
        id: create_pr_with_benchmark_token
        if: ${{ secrets.PIPELINEZ_BENCHMARK_PR_TOKEN != '' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PIPELINEZ_BENCHMARK_PR_TOKEN }}
          commit-message: "docs: update benchmark results"
          branch: automation/benchmark-results-${{ github.run_id }}
          delete-branch: true
          title: "docs: update benchmark results"
          body: |
            This PR updates `documentation/guides/benchmark-results.md` from benchmark workflow artifacts.

            Source workflow:
            - `${{ github.workflow }}`
            - Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The page is generated automatically and is intended for maintainer review before merge.

      - name: Create Pull Request With GitHub Token
        id: create_pr_with_github_token
        if: ${{ secrets.PIPELINEZ_BENCHMARK_PR_TOKEN == '' }}
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "docs: update benchmark results"
          branch: automation/benchmark-results-${{ github.run_id }}
          delete-branch: true
          title: "docs: update benchmark results"
          body: |
            This PR updates `documentation/guides/benchmark-results.md` from benchmark workflow artifacts.

            Source workflow:
            - `${{ github.workflow }}`
            - Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The page is generated automatically and is intended for maintainer review before merge.

      - name: Summarize Pull Request Automation
        if: always()
        shell: bash
        env:
          BENCHMARK_TOKEN_OUTCOME: ${{ steps.create_pr_with_benchmark_token.outcome }}
          GITHUB_TOKEN_OUTCOME: ${{ steps.create_pr_with_github_token.outcome }}
        run: |
          {
            echo "## Benchmark Results Publication"
            echo

            if [ "${BENCHMARK_TOKEN_OUTCOME}" = "success" ] || [ "${GITHUB_TOKEN_OUTCOME}" = "success" ]; then
              echo "Created or updated the benchmark results pull request."
            elif [ "${BENCHMARK_TOKEN_OUTCOME}" = "failure" ]; then
              echo "Pull request creation failed even though \`PIPELINEZ_BENCHMARK_PR_TOKEN\` is configured."
              echo
              echo "Verify that the token can push branches and open pull requests in this repository."
            else
              echo "Automatic pull request creation was skipped because this repository does not allow pull requests to be created with the default \`GITHUB_TOKEN\`."
              echo
              echo "Configure the \`PIPELINEZ_BENCHMARK_PR_TOKEN\` secret with a PAT or GitHub App token that can push branches and open pull requests, or enable the repository Actions setting that allows GitHub Actions to create pull requests."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
