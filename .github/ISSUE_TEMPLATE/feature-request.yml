name: Feature Request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels:
  - type:feature
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core runtime
        - Kafka transport
        - New transport
        - Packaging and release
        - Documentation
        - Operations
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve for Pipelinez users?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, or documentation you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: release-impact
    attributes:
      label: Expected release impact
      options:
        - Patch
        - Minor
        - Major
        - Not sure
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues before opening this one.
          required: true
